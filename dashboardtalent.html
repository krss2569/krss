<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แดชบอร์ดข้อมูลแววความสามารถพิเศษ</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; color: #333; }
        .navbar { background-color: #2c3e50; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 24px; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner-border text-primary" role="status"></div>
        <h5 class="mt-3 text-muted">กำลังดึงข้อมูลจาก Google Sheets...</h5>
        <p id="loading-error" class="text-danger mt-2" style="display:none;"></p>
    </div>

    <nav class="navbar navbar-dark mb-4 p-3"><div class="container-fluid"><span class="navbar-brand"><i class="bi bi-bar-chart-fill me-2"></i> ระบบวิเคราะห์แววความสามารถพิเศษ</span></div></nav>

    <div class="container-fluid px-4" id="dashboard-content" style="display: none;">
        <div class="row" id="kpi-row"></div>
        <div class="row">
            <div class="col-lg-6 mb-4"><div class="card p-3"><canvas id="radarChart"></canvas></div></div>
            <div class="col-lg-6 mb-4"><div class="card p-3"><canvas id="barChart"></canvas></div></div>
        </div>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr id="table-head">
                        <th>Timestamp</th><th>ชื่อ-สกุล</th><th>ด้านภาษา</th><th>ด้านตรรกะ</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <script>
        // ใช้รหัส ID จากลิงก์ที่คุณให้มา
        const SHEET_ID = '1A3fe7R8o4vqjuddq0sN2kTSNofa6zT-B08A_8eYnNts';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            complete: function(results) {
                if (results.data && results.data.length > 0) {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('dashboard-content').style.display = 'block';
                    processData(results.data);
                } else {
                    showError("ไม่พบข้อมูล กรุณาตรวจสอบสิทธิ์การแชร์ไฟล์เป็น 'ทุกคนที่มีลิงก์'");
                }
            },
            error: function(err) {
                showError("เกิดข้อผิดพลาดในการเชื่อมต่อ (CORS Error): โปรดเช็คว่าได้ตั้งค่า Share เป็น 'Anyone with the link' แล้ว");
            }
        });

        function showError(msg) {
            const err = document.getElementById('loading-error');
            err.innerText = msg;
            err.style.display = 'block';
        }

        function processData(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; // เคลียร์ตารางก่อนแสดงผล
            
            data.forEach(row => {
                // ค้นหาหัวคอลัมน์ที่ตรงกับรูปแบบที่ไฟล์มีจริง
                const timestamp = row['Timestamp'] || '-';
                const name = row[' ชื่อ-สกุล'] || row['ชื่อ-สกุล'] || '-';
                const lang = row['ด้านภาษา'] || 0;
                const logic = row['ด้านตรรกะ'] || 0;

                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${timestamp}</td>
                                <td>${name}</td>
                                <td>${lang}</td>
                                <td>${logic}</td>`;
                tbody.appendChild(tr);
            });
            console.log("Data processed:", data);
        }
    </script>
</body>
</html>
