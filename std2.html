<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเก็บข้อมูลพื้นฐานนักเรียน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #eff6ff; /* blue-50 */
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23bfdbfe' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .form-input {
            @apply mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-200 focus:ring-opacity-50 transition duration-150 ease-in-out px-4 py-2 sm:py-3 border text-sm sm:text-base;
        }
        .form-label {
            @apply block text-sm sm:text-base font-medium text-gray-700 mb-1;
        }
        .form-section-title {
            @apply text-lg sm:text-xl font-semibold text-blue-600 border-b-2 border-blue-200 pb-2 mb-4 mt-6 sm:mt-8;
        }
    </style>
</head>
<body class="min-h-screen text-gray-800 pb-12">

    <!-- Login Screen -->
    <div id="login-screen" class="flex items-center justify-center min-h-screen p-4 transition-opacity duration-500">
        <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-xl max-w-md w-full border-t-4 border-blue-500 relative overflow-hidden">
            <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-blue-100 rounded-full opacity-50"></div>
            <div class="absolute bottom-0 left-0 -mb-4 -ml-4 w-16 h-16 bg-blue-200 rounded-full opacity-50"></div>
            
            <div class="text-center mb-8 relative z-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 mb-4 shadow-inner">
                    <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">เข้าสู่ระบบ</h2>
                <p class="text-gray-500 mt-2 text-sm">เพื่อเข้าสู่ระบบข้อมูลพื้นฐานนักเรียน</p>
            </div>
            
            <form id="login-form" class="space-y-4 relative z-10">
                <div>
                    <label for="username" class="form-label">รหัสนักเรียน</label>
                    <input type="text" id="username" required class="form-input text-center text-lg" placeholder="กรอกรหัสนักเรียน">
                </div>
                <div>
                    <label for="password" class="form-label">รหัสผ่าน (Password)</label>
                    <input type="password" id="password" required class="form-input text-center text-lg" placeholder="กรอกรหัสผ่าน">
                </div>
                <button type="submit" id="btn-login" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg hover:shadow-xl transition duration-200 transform hover:-translate-y-1 mt-4 flex items-center justify-center">
                    <span id="login-text">เข้าสู่ระบบ</span>
                    <svg id="login-spinner" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <!-- Main Form Screen (Hidden initially) -->
    <div id="main-screen" class="hidden w-full max-w-4xl mx-auto p-3 sm:p-4 pt-6 sm:pt-8 transition-opacity duration-500">
        <div class="bg-white rounded-2xl sm:rounded-3xl shadow-xl overflow-hidden w-full">
            <!-- Header -->
            <div class="bg-gradient-to-r from-blue-600 to-cyan-500 py-6 px-5 sm:px-8 text-white relative">
                <div class="absolute inset-0 bg-white opacity-10 pattern-dots"></div>
                <h1 class="text-2xl sm:text-3xl font-bold relative z-10 leading-tight">แบบฟอร์มข้อมูลพื้นฐานนักเรียน</h1>
                <p class="text-blue-100 mt-2 text-sm sm:text-base relative z-10">กรุณากรอกข้อมูลให้ครบถ้วนและเป็นความจริง</p>
                <div class="absolute right-5 sm:right-8 top-1/2 transform -translate-y-1/2 bg-white/20 px-3 py-1 sm:px-4 sm:py-2 rounded-lg backdrop-blur-sm hidden md:block">
                    ผู้ใช้งาน: <span id="display-student-name" class="font-bold"></span>
                </div>
            </div>

            <!-- Form Body -->
            <form id="data-form" class="p-5 sm:p-8">
                
                <!-- Section 1: Personal Info -->
                <h3 class="form-section-title">1. ข้อมูลส่วนตัว</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label for="prefix" class="form-label">1. คำนำหน้า <span class="text-red-500">*</span></label>
                        <select id="prefix" required class="form-input bg-white">
                            <option value="">เลือกคำนำหน้า</option>
                            <option value="เด็กชาย">เด็กชาย</option>
                            <option value="เด็กหญิง">เด็กหญิง</option>
                            <option value="นาย">นาย</option>
                            <option value="นางสาว">นางสาว</option>
                        </select>
                    </div>
                    <div>
                        <label for="fname" class="form-label">2. ชื่อ <span class="text-red-500">*</span></label>
                        <input type="text" id="fname" required class="form-input" placeholder="ไม่ต้องใส่คำนำหน้า">
                    </div>
                    <div>
                        <label for="lname" class="form-label">3. นามสกุล <span class="text-red-500">*</span></label>
                        <input type="text" id="lname" required class="form-input">
                    </div>
                    <div>
                        <label for="dob" class="form-label">4. วัน/เดือน/ปีเกิด <span class="text-red-500">*</span></label>
                        <input type="date" id="dob" required class="form-input">
                    </div>
                    <div>
                        <label for="student-phone" class="form-label">6. เบอร์โทรศัพท์นักเรียน</label>
                        <input type="tel" id="student-phone" class="form-input" placeholder="08xxxxxxxx">
                    </div>
                </div>

                <!-- Section 2: Address -->
                <h3 class="form-section-title">2. ที่อยู่ปัจจุบัน (ข้อ 5)</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label for="addr-house-no" class="form-label">บ้านเลขที่ <span class="text-red-500">*</span></label>
                        <input type="text" id="addr-house-no" required class="form-input">
                    </div>
                    <div>
                        <label for="addr-moo" class="form-label">หมู่ที่</label>
                        <input type="text" id="addr-moo" class="form-input">
                    </div>
                    <div>
                        <label for="addr-subdistrict" class="form-label">ตำบล <span class="text-red-500">*</span></label>
                        <input type="text" id="addr-subdistrict" required class="form-input">
                    </div>
                    <div>
                        <label for="addr-district" class="form-label">อำเภอ <span class="text-red-500">*</span></label>
                        <input type="text" id="addr-district" required class="form-input">
                    </div>
                    <div>
                        <label for="addr-province" class="form-label">จังหวัด <span class="text-red-500">*</span></label>
                        <input type="text" id="addr-province" required class="form-input">
                    </div>
                    <div>
                        <label for="addr-zip" class="form-label">รหัสไปรษณีย์ <span class="text-red-500">*</span></label>
                        <input type="text" id="addr-zip" required class="form-input" maxlength="5">
                    </div>
                </div>

                <!-- Section 3: Family Info -->
                <h3 class="form-section-title">3. ข้อมูลครอบครัว</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="parent-name" class="form-label">7. ชื่อ-นามสกุล ผู้ปกครอง <span class="text-red-500">*</span></label>
                        <input type="text" id="parent-name" required class="form-input">
                    </div>
                    <div>
                        <label for="parent-relation" class="form-label">8. เกี่ยวข้องเป็น <span class="text-red-500">*</span></label>
                        <select id="parent-relation" required class="form-input bg-white">
                            <option value="">เลือกความสัมพันธ์</option>
                            <option value="บิดา">พ่อ</option>
                            <option value="มารดา">แม่</option>
                            <option value="ปู่/ตา">ปู่/ตา</option>
                            <option value="ย่า/ยาย">ย่า/ยาย</option>
                            <option value="ลุง/ป้า/น้า/อา">ลุง/ป้า/น้า/อา</option>
                            <option value="พี่">พี่</option>
                            <option value="อื่นๆ">อื่นๆ</option>
                        </select>
                    </div>
                    <div>
                        <label for="parent-phone" class="form-label">9. เบอร์โทรผู้ปกครอง <span class="text-red-500">*</span></label>
                        <input type="tel" id="parent-phone" required class="form-input" placeholder="08xxxxxxxx">
                    </div>
                    <div>
                        <label for="family-status" class="form-label">10. สถานะครอบครัว <span class="text-red-500">*</span></label>
                        <select id="family-status" required class="form-input bg-white">
                            <option value="">เลือกสถานะ</option>
                            <option value="พ่อแม่อยู่ด้วยกัน">พ่อแม่อยู่ด้วยกัน</option>
                            <option value="แยกทางกัน">แยกทางกัน</option>
                            <option value="หย่าร้าง">หย่าร้าง</option>
                            <option value="บิดาหรือมารดาเสียชีวิต">บิดาหรือมารดาเสียชีวิต</option>
                        </select>
                    </div>
                    <div>
                        <label for="family-income" class="form-label">11. รายได้ของครอบครัว/เดือน (บาท)</label>
                        <input type="number" id="family-income" class="form-input" placeholder="ระบุตัวเลข">
                    </div>
                </div>

                <!-- Section 4: School Info & Others -->
                <h3 class="form-section-title">4. ข้อมูลการเรียนและความสามารถ</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="daily-allowance" class="form-label">12. ได้เงินมาโรงเรียนวันละ (บาท)</label>
                        <input type="number" id="daily-allowance" class="form-input" placeholder="ระบุตัวเลข">
                    </div>
                    <div>
                        <label for="transportation" class="form-label">13. มาโรงเรียนอย่างไร <span class="text-red-500">*</span></label>
                        <select id="transportation" required class="form-input bg-white">
                            <option value="">เลือกวิธีการเดินทาง</option>
                            <option value="เดิน">เดิน</option>
                            <option value="รถจักรยาน">รถจักรยาน</option>
                            <option value="รถมอเตอร์ไซต์">รถมอเตอร์ไซต์ (ขับมาเอง)</option>
                            <option value="ผู้ปกครองมาส่ง">ผู้ปกครองมาส่ง</option>
                            <option value="รถโดยสารประจำทาง">รถโดยสารประจำทาง</option>
                            <option value="รถรับส่งนักเรียน">รถรับส่งนักเรียน</option>
                        </select>
                    </div>
                    <div>
                        <label for="distance" class="form-label">14. ระยะทางจากบ้านถึงโรงเรียน (กิโลเมตร)</label>
                        <input type="number" id="distance" step="0.1" class="form-input" placeholder="ตัวอย่าง: 5.5">
                    </div>
                    <div class="md:col-span-2">
                        <label for="special-talents" class="form-label">15. ความสามารถพิเศษ (เช่น ดนตรี กีฬา เทคโนโลยี)</label>
                        <textarea id="special-talents" rows="2" class="form-input"></textarea>
                    </div>
                    <div class="md:col-span-2">
                        <label for="expectations" class="form-label">16. ความคาดหวังของนักเรียนเมื่อเรียนจบ</label>
                        <textarea id="expectations" rows="3" class="form-input"></textarea>
                    </div>
                </div>

                <!-- Submit Area -->
                <div class="mt-8 sm:mt-10 flex flex-col-reverse sm:flex-row items-center justify-end gap-3 sm:gap-0 sm:space-x-4 border-t pt-6">
                    <button type="button" id="btn-logout" class="w-full sm:w-auto px-6 py-3 sm:py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition font-medium">
                        ออกระบบ
                    </button>
                    <button type="submit" id="btn-submit" class="w-full sm:w-auto px-8 py-3 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-lg shadow-lg hover:shadow-xl transition flex items-center justify-center">
                        <span id="btn-text">บันทึกข้อมูล</span>
                        <svg id="btn-spinner" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Custom Modal for Alerts -->
    <div id="custom-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300" id="modal-content">
            <div id="modal-icon" class="mx-auto flex items-center justify-center h-16 w-16 rounded-full mb-6">
                <!-- Icon injected by JS -->
            </div>
            <h3 id="modal-title" class="text-xl font-bold text-center text-gray-900 mb-2">Title</h3>
            <p id="modal-message" class="text-center text-gray-600 mb-8">Message goes here.</p>
            <button id="modal-btn" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-xl transition duration-200">
                ตกลง
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global context variables provided by the environment
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'student-info-app';
        let firebaseConfig = {};
        let initialAuthToken = null;

        try {
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
            }
            if (typeof __initial_auth_token !== 'undefined') {
                initialAuthToken = __initial_auth_token;
            }
        } catch (e) {
            console.error("Error parsing env config", e);
        }

        // Initialize Firebase
        const app = Object.keys(firebaseConfig).length > 0 ? initializeApp(firebaseConfig) : null;
        const db = app ? getFirestore(app) : null;
        const auth = app ? getAuth(app) : null;

        // UI Elements
        const loginScreen = document.getElementById('login-screen');
        const mainScreen = document.getElementById('main-screen');
        const loginForm = document.getElementById('login-form');
        const dataForm = document.getElementById('data-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const btnLogin = document.getElementById('btn-login');
        const loginText = document.getElementById('login-text');
        const loginSpinner = document.getElementById('login-spinner');
        const displayStudentName = document.getElementById('display-student-name');
        const btnLogout = document.getElementById('btn-logout');
        
        // Modal Elements
        const modal = document.getElementById('custom-modal');
        const modalContent = document.getElementById('modal-content');
        const modalTitle = document.getElementById('modal-title');
        const modalMessage = document.getElementById('modal-message');
        const modalIcon = document.getElementById('modal-icon');
        const modalBtn = document.getElementById('modal-btn');

        let currentStudentId = '';

        // 1. นำ URL ที่ได้จาก Google Apps Script (Web App) มาวางในเครื่องหมายคำพูดด้านล่างนี้
        const scriptURL = ''https://script.google.com/macros/s/AKfycbx9KpM_qZhqZP_xbLFznpGZC47QIIz_8jAr-fZz3kypDsMmfxNQDB1C2LiFF6MaqTv4/exec';

        // Authentication Helper
        async function authenticate() {
            if (!auth) return null;
            try {
                if (initialAuthToken) {
                    await signInWithCustomToken(auth, initialAuthToken);
                } else {
                    await signInAnonymously(auth);
                }
                return auth.currentUser;
            } catch (error) {
                console.error("Auth error:", error);
                return null;
            }
        }

        // Helper to show modal
        function showModal(type, title, message, callback = null) {
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            
            if (type === 'success') {
                modalIcon.innerHTML = `<svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
                modalIcon.className = "mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-6";
                modalBtn.className = "w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-xl transition duration-200";
            } else if (type === 'error') {
                modalIcon.innerHTML = `<svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                modalIcon.className = "mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 mb-6";
                modalBtn.className = "w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-xl transition duration-200";
            }

            modal.classList.remove('hidden');
            // Trigger reflow
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            modalContent.classList.remove('scale-95');

            modalBtn.onclick = () => {
                modal.classList.add('opacity-0');
                modalContent.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    if (callback) callback();
                }, 300);
            };
        }

        // Login Submit
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const uname = usernameInput.value.trim();
            const pass = passwordInput.value.trim();
            
            if (uname && pass) {
                if (scriptURL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL') {
                    showModal('error', 'ข้อผิดพลาดของระบบ', 'กรุณาใส่ Web App URL ในโค้ดก่อนใช้งานจริง (อ่านวิธีตั้งค่าด้านบน)');
                    return;
                }

                btnLogin.disabled = true;
                loginText.textContent = 'กำลังตรวจสอบ...';
                loginSpinner.classList.remove('hidden');

                try {
                    const params = new URLSearchParams();
                    params.append('action', 'login');
                    params.append('username', uname);
                    params.append('password', pass);

                    const response = await fetch(scriptURL, {
                        method: 'POST',
                        body: params
                    });
                    
                    const result = await response.json();

                    if (result.success) {
                        currentStudentId = uname;
                        
                        // จัดการแสดงชื่อผู้ใช้งานบนแถบด้านบน
                        let displayName = uname;
                        if (result.data && result.data.firstName) {
                            displayName = `${uname} - ${result.data.prefix || ''}${result.data.firstName} ${result.data.lastName || ''}`;
                        }
                        displayStudentName.textContent = displayName;
                        
                        // นำข้อมูลที่ดึงมาใส่ลงในฟอร์ม (ถ้ามี)
                        if (result.data) {
                            document.getElementById('prefix').value = result.data.prefix || '';
                            document.getElementById('fname').value = result.data.firstName || '';
                            document.getElementById('lname').value = result.data.lastName || '';
                            
                            // จัดการรูปแบบวันที่ให้รองรับ YYYY-MM-DD เพื่อแสดงใน input type="date"
                            let dob = result.data.dateOfBirth || '';
                            if (dob) {
                                if (dob.includes('/')) {
                                    let parts = dob.split('/');
                                    let year = parseInt(parts[2]);
                                    if (year > 2500) year -= 543; // แปลงพ.ศ. เป็น ค.ศ.
                                    dob = `${year}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
                                } else if (dob.includes('-')) {
                                    let parts = dob.split('-');
                                    let year = parseInt(parts[0]);
                                    if (year > 2500) {
                                       year -= 543;
                                       dob = `${year}-${parts[1]}-${parts[2]}`;
                                    }
                                }
                                document.getElementById('dob').value = dob;
                            }

                            document.getElementById('addr-house-no').value = result.data.houseNo || '';
                            document.getElementById('addr-moo').value = result.data.moo || '';
                            document.getElementById('addr-subdistrict').value = result.data.subdistrict || '';
                            document.getElementById('addr-district').value = result.data.district || '';
                            document.getElementById('addr-province').value = result.data.province || '';
                            document.getElementById('addr-zip').value = result.data.zip || '';
                            document.getElementById('student-phone').value = result.data.studentPhone || '';
                            document.getElementById('parent-name').value = result.data.parentName || '';
                            document.getElementById('parent-relation').value = result.data.parentRelation || '';
                            document.getElementById('parent-phone').value = result.data.parentPhone || '';
                            document.getElementById('family-status').value = result.data.familyStatus || '';
                            document.getElementById('family-income').value = result.data.familyIncome || '';
                            document.getElementById('daily-allowance').value = result.data.dailyAllowance || '';
                            document.getElementById('transportation').value = result.data.transportation || '';
                            document.getElementById('distance').value = result.data.distance || '';
                            document.getElementById('special-talents').value = result.data.specialTalents || '';
                            document.getElementById('expectations').value = result.data.expectations || '';
                        }
                        
                        // Transition screens
                        loginScreen.classList.add('opacity-0');
                        setTimeout(() => {
                            loginScreen.classList.add('hidden');
                            mainScreen.classList.remove('hidden');
                            // Reflow
                            void mainScreen.offsetWidth;
                            mainScreen.classList.remove('opacity-0');
                        }, 500);
                    } else {
                        showModal('error', 'เข้าสู่ระบบล้มเหลว', result.message || 'ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง');
                    }
                } catch (error) {
                    console.error("Login Error:", error);
                    showModal('error', 'เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ กรุณาลองอีกครั้ง');
                } finally {
                    btnLogin.disabled = false;
                    loginText.textContent = 'เข้าสู่ระบบ';
                    loginSpinner.classList.add('hidden');
                }
            }
        });

        // Logout
        btnLogout.addEventListener('click', () => {
            currentStudentId = '';
            usernameInput.value = '';
            passwordInput.value = '';
            dataForm.reset();
            
            mainScreen.classList.add('opacity-0');
            setTimeout(() => {
                mainScreen.classList.add('hidden');
                loginScreen.classList.remove('hidden');
                // Reflow
                void loginScreen.offsetWidth;
                loginScreen.classList.remove('opacity-0');
            }, 500);
        });

        // Form Submit to Firestore
        dataForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btn-submit');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');

            // UI Loading state
            btnSubmit.disabled = true;
            btnText.textContent = 'กำลังบันทึก...';
            btnSpinner.classList.remove('hidden');

            try {
                if (scriptURL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL') {
                    throw new Error("ยังไม่ได้ใส่ Web App URL");
                }

                // 2. รวบรวมข้อมูลในรูปแบบ URLSearchParams
                const formData = new URLSearchParams();
                formData.append('action', 'saveData');
                formData.append('studentId', currentStudentId);
                formData.append('prefix', document.getElementById('prefix').value);
                formData.append('firstName', document.getElementById('fname').value);
                formData.append('lastName', document.getElementById('lname').value);
                formData.append('dateOfBirth', document.getElementById('dob').value);
                formData.append('houseNo', document.getElementById('addr-house-no').value);
                formData.append('moo', document.getElementById('addr-moo').value);
                formData.append('subdistrict', document.getElementById('addr-subdistrict').value);
                formData.append('district', document.getElementById('addr-district').value);
                formData.append('province', document.getElementById('addr-province').value);
                formData.append('zip', document.getElementById('addr-zip').value);
                formData.append('studentPhone', document.getElementById('student-phone').value);
                formData.append('parentName', document.getElementById('parent-name').value);
                formData.append('parentRelation', document.getElementById('parent-relation').value);
                formData.append('parentPhone', document.getElementById('parent-phone').value);
                formData.append('familyStatus', document.getElementById('family-status').value);
                formData.append('familyIncome', document.getElementById('family-income').value);
                formData.append('dailyAllowance', document.getElementById('daily-allowance').value);
                formData.append('transportation', document.getElementById('transportation').value);
                formData.append('distance', document.getElementById('distance').value);
                formData.append('specialTalents', document.getElementById('special-talents').value);
                formData.append('expectations', document.getElementById('expectations').value);
                formData.append('submittedAt', new Date().toLocaleString('th-TH'));

                // 3. ส่งข้อมูลไปยัง Google Sheet
                const response = await fetch(scriptURL, { 
                    method: 'POST', 
                    body: formData
                });
                
                const result = await response.json();

                if(result.success) {
                    // นำการสั่ง logout อัตโนมัติออก เพื่อให้อยู่ในระบบต่อ
                    showModal('success', 'สำเร็จ', result.message || 'ข้อมูลถูกบันทึกเรียบร้อยแล้ว');
                } else {
                    showModal('error', 'บันทึกไม่สำเร็จ', result.message || 'เกิดข้อผิดพลาดจากเซิร์ฟเวอร์');
                }

            } catch (error) {
                console.error("Error saving document: ", error);
                showModal('error', 'เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อหรือบันทึกข้อมูลได้ กรุณาลองใหม่อีกครั้ง');
            } finally {
                // Restore UI
                btnSubmit.disabled = false;
                btnText.textContent = 'บันทึกข้อมูล';
                btnSpinner.classList.add('hidden');
            }
        });

    </script>
</body>
</html>
